version: '3.8'

# Portainer Stack for Christophe Verdier Portfolio
# Deploy this via Portainer UI or use webhook deployment with deploy-portainer.sh

services:
  web:
    image: registry.sponge-theory.dev/christophe-portfolio:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
    secrets:
      - anthropic_api_key
    volumes:
      # Persists the page-view counter across redeploys. The task is pinned to
      # node.labels.NODE == 2 below, so this node-scoped local volume always
      # follows it — the counter survives restarts and redeploys.
      - portfolio-data:/app/data
    networks:
      - webfacing
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.NODE == 2

networks:
  webfacing:
    driver: overlay
    external: true

volumes:
  portfolio-data:
    driver: local

secrets:
  anthropic_api_key:
    external: true

# To create the secret in Portainer:
# 1. Go to Secrets in Portainer
# 2. Create new secret named "anthropic_api_key"
# 3. Paste your Anthropic API key as the value
#
# Or via command line:
# echo "your-api-key" | docker secret create anthropic_api_key -
