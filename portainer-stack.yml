version: '3.8'

# Portainer Stack for Christophe Verdier Portfolio
# Deploy this via Portainer UI or use webhook deployment with deploy-portainer.sh

services:
  web:
    image: registry.sponge-theory.dev/christophe-portfolio:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    secrets:
      - anthropic_api_key
    deploy:
      mode: replicated
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
      labels:
        # Traefik labels for automatic routing and SSL
        - "traefik.enable=true"
        - "traefik.http.routers.portfolio.rule=Host(`christophe-verdier.com`) || Host(`www.christophe-verdier.com`)"
        - "traefik.http.routers.portfolio.entrypoints=websecure"
        - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
        - "traefik.http.services.portfolio.loadbalancer.server.port=3000"
        # Redirect www to non-www
        - "traefik.http.middlewares.portfolio-redirect.redirectregex.regex=^https://www\\.christophe-verdier\\.com/(.*)"
        - "traefik.http.middlewares.portfolio-redirect.redirectregex.replacement=https://christophe-verdier.com/$${1}"
        - "traefik.http.routers.portfolio.middlewares=portfolio-redirect"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network
      - traefik-public

  # Optional: Redis for session storage (recommended for production)
  # Uncomment if using Redis
  # redis:
  #   image: redis:7-alpine
  #   deploy:
  #     mode: replicated
  #     replicas: 1
  #     restart_policy:
  #       condition: on-failure
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 256M
  #       reservations:
  #         cpus: '0.25'
  #         memory: 128M
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - portfolio-network
  #   command: redis-server --appendonly yes

networks:
  portfolio-network:
    driver: overlay
    attachable: true
  traefik-public:
    external: true

# volumes:
#   redis-data:
#     driver: local

secrets:
  anthropic_api_key:
    external: true

# To create the secret in Portainer:
# 1. Go to Secrets in Portainer
# 2. Create new secret named "anthropic_api_key"
# 3. Paste your Anthropic API key as the value
#
# Or via command line:
# echo "your-api-key" | docker secret create anthropic_api_key -
