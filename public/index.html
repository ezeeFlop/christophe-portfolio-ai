                    { name: "Développement Mobile", detail: "Swift, Kotlin - gestion d'équipes, expérience pratique" },
                    { name: "IoT & Embarqué", detail: "ESP32, Raspberry Pi, conception PCB" },
                    { name: "Vision par Ordinateur", detail: "YOLOv8, OpenCV, applications pratiques" },
                    { name: "MLOps", detail: "Déploiement de modèles, monitoring, versioning" }
                ],
                gaps: [
                    { name: "Produit Grand Public", detail: "Carrière orientée B2B, expérience limitée en produit consommateur" },
                    { name: "Marketing/Growth", detail: "Leader technique, pas de rôles orientés croissance" },
                    { name: "Recherche Académique", detail: "Focus industrie pratique, pas de publications" }
                ]
            }
        };

        // Generate unique session ID
        const generateSessionId = () => Math.random().toString(36).substring(2, 15);

        // Markdown renderer component
        function MarkdownContent({ content, className = '' }) {
            const htmlContent = marked.parse(content, {
                breaks: true,
                gfm: true
            });

            return React.createElement('div', {
                className: `markdown-content ${className}`,
                dangerouslySetInnerHTML: { __html: htmlContent }
            });
        }

        // Main App Component
        function App() {
            const [lang, setLang] = useState('en');
            const [chatOpen, setChatOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [expandedContext, setExpandedContext] = useState({});
            const [jobDescription, setJobDescription] = useState('');
            const [fitResult, setFitResult] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [sessionId] = useState(generateSessionId);
            const [pageViews, setPageViews] = useState(0);
            const chatEndRef = useRef(null);
            const t = translations[lang];
            const exp = experiences[lang];
            const sk = skills[lang];

            // Fetch page view stats on mount
            useEffect(() => {
                const fetchStats = async () => {
                    try {
                        const response = await fetch(`${API_BASE}/api/stats`);
                        const data = await response.json();
                        setPageViews(data.pageViews);
                    } catch (error) {
                        console.error('Failed to fetch stats:', error);
                    }
                };
                fetchStats();
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            // Handle Escape key to close chat modal
            useEffect(() => {
                const handleEscape = (e) => {
                    if (e.key === 'Escape' && chatOpen) {
                        setChatOpen(false);
                    }
                };
                document.addEventListener('keydown', handleEscape);
                return () => document.removeEventListener('keydown', handleEscape);
            }, [chatOpen]);

            // Enhanced client-side input validation (OWASP GenAI 2025/2026)
            const validateInput = (text) => {
                if (!text.trim()) {
                    return { valid: false, error: lang === 'fr' ? 'Le message ne peut pas être vide' : 'Message cannot be empty' };
                }

                if (text.length > 2000) {
                    return { valid: false, error: lang === 'fr' ? 'Message trop long (max 2000 caractères)' : 'Message is too long (max 2000 characters)' };
                }

                // Enhanced jailbreak pattern detection (matching backend patterns)
                const suspiciousPatterns = [
                    // Instruction override
                    /ignore\s+(all\s+)?(previous|above|prior)\s+(instructions?|prompts?|rules)/i,
                    /forget\s+(everything|all)\s+(you\s+)?(know|learned|instructions)/i,
                    /disregard\s+(your|the|all)\s+(training|instructions|guidelines|rules)/i,

                    // Identity manipulation
                    /you\s+are\s+(no\s+longer|not|now)\s+(.+?\s+)?(assistant|AI|Claude)/i,
                    /new\s+(instructions?|prompts?|rules|role|character)/i,
                    /act\s+as\s+(if\s+)?(you|you're|you\s+are)/i,
                    /pretend\s+(to\s+be|you\s+are|you're)/i,
                    /roleplay\s+(as|that)/i,
                    /imagine\s+you\s+are/i,

                    // System prompt leakage (OWASP LLM07:2025)
                    /system\s+(prompt|message|instruction)/i,
                    /(show|reveal|print)\s+(your\s+)?(system\s+)?(prompt|instructions)/i,

                    // Mode switching
                    /DAN\s+mode/i,
                    /(developer|admin|debug)\s+mode/i,
                    /simulation\s+mode/i,

                    // Jailbreak keywords
                    /jailbreak/i,
                    /bypass\s+(safety|guidelines|restrictions)/i,

                    // Context manipulation
                    /from\s+now\s+on,?\s+you/i,
                    /reset\s+(conversation|context)/i,

                    // Special tokens
                    /{{.*}}|<\|.*\|>/i,
                    /\[INST\]|\[\/INST\]/i,
                ];

                for (const pattern of suspiciousPatterns) {
                    if (pattern.test(text)) {
                        return {
                            valid: false,
                            error: lang === 'fr'
                                ? 'Votre message contient des instructions inappropriées. Veuillez poser une question sur l\'expérience professionnelle.'
                                : 'Your message contains inappropriate instructions. Please ask about professional experience.'
                        };
                    }
                }

                // Check for excessive special characters
                const specialCharRatio = (text.match(/[<>{}[\]|\\]/g) || []).length / text.length;
                if (specialCharRatio > 0.1) {
                    return {
                        valid: false,
                        error: lang === 'fr'
                            ? 'Message contient un formatage inhabituel. Veuillez utiliser du texte normal.'
                            : 'Message contains unusual formatting. Please use plain text.'
                    };
                }

                // Check for excessive newlines
                const newlineCount = (text.match(/\n/g) || []).length;
                if (newlineCount > 10) {
                    return {
                        valid: false,
                        error: lang === 'fr'
                            ? 'Message contient trop de sauts de ligne.'
                            : 'Message contains too many line breaks.'
                    };
                }

                return { valid: true };
            };

            // Real API call to Claude
            const handleSendMessage = async (customMessage = null) => {
                const messageToSend = customMessage || inputValue;
                if (!messageToSend.trim()) return;

                // Validate input on client side first
                const validation = validateInput(messageToSend);
                if (!validation.valid) {
                    setMessages(prev => [...prev,
                        { role: 'user', content: messageToSend },
                        { role: 'ai', content: `⚠️ ${validation.error}` }
                    ]);
                    setInputValue('');
                    return;
                }

                const userMessage = { role: 'user', content: messageToSend };
                setMessages(prev => [...prev, userMessage]);
                setInputValue('');
                setIsTyping(true);

                try {
                    const response = await fetch(`${API_BASE}/api/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: messageToSend,
                            sessionId,
                            language: lang
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setMessages(prev => [...prev, { role: 'ai', content: data.message }]);
                    } else {
                        setMessages(prev => [...prev, { role: 'ai', content: `⚠️ ${data.error || 'Failed to get response'}` }]);
                    }
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: '⚠️ Connection error. Please make sure the server is running.' }]);
                } finally {
                    setIsTyping(false);
                }
            };

            // Real API call for fit assessment
            const handleAnalyzeFit = async () => {
                if (!jobDescription.trim()) return;
                setIsAnalyzing(true);
                setFitResult(null);

                    const response = await fetch(`${API_BASE}/api/fit-assessment`, {

                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            jobDescription,
                            language: lang
                        })

                            fit: 'error',
                            title: '❌ Error',
                            summary: data.error || 'Failed to analyze',
                            alignments: [],
                            gaps: [],
                            recommendation: 'Please try again.'
                        });

                        fit: 'error',
                        title: '❌ Connection Error',
                        summary: 'Could not connect to the AI service.',
                        alignments: [],
                        gaps: [],
                        recommendation: 'Please make sure the server is running.'
                    });

                    setIsAnalyzing(false);
                }

                            <span className="hidden md:inline">•</span>
                            <a href="https://github.com/ezeeFlop/christophe-portfolio-ai" target="_blank" rel="noopener noreferrer" className="underline hover:text-orange-100 transition-colors hidden md:inline">View Source Code</a>

                            <div
                                className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="flex items-center justify-between p-4 border-b">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-orange-400 to-orange-600 flex items-center justify-center text-xl" aria-hidden="true">🤖</div>
                                        <div>
                                            <h3 id="chat-modal-title" className="font-bold text-gray-900">{t.askAI}</h3>
                                            <p className="text-xs text-gray-500">{t.poweredBy}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setChatOpen(false)} className="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center" aria-label="Close chat">✕</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4" role="log" aria-live="polite" aria-atomic="false">
                                    {messages.length === 0 && (
                                        <div className="text-center py-8 text-gray-500">
                                            <p className="text-4xl mb-4">👋</p>
                                            <p className="mb-6">{lang === 'fr' ? "Posez-moi une question sur l'expérience de Christophe, ses compétences en IA, son parcours en F1, ou ses projets..." : "Ask me about Christophe's experience, his AI expertise, F1 background, or projects..."}</p>
                                            <div className="text-left max-w-md mx-auto">
                                                <p className="text-sm font-semibold text-gray-700 mb-3">{lang === 'fr' ? '💡 Questions suggérées :' : '💡 Try asking:'}</p>
                                                <div className="space-y-2">
                                                    {(lang === 'fr' ? [
                                                        "Explique-moi NeoRAG et comment il fonctionne",
                                                        "Quelle est ton expérience avec les systèmes RAG ?",
                                                        "Comment accompagnes-tu les entreprises sur l'IA générative ?",
                                                        "Parle-moi de ton parcours en Formule 1",
                                                        "Quels sont tes principaux clients et projets IA ?"
                                                    ] : [
                                                        "Tell me about NeoRAG and how it works",
                                                        "What's your experience with RAG systems?",
                                                        "How do you help companies with Generative AI?",
                                                        "Tell me about your Formula 1 background",
                                                        "What are your main AI clients and projects?"
                                                    ]).map((question, idx) => (
                                                        <button
                                                            key={idx}
                                                            onClick={() => handleSendMessage(question)}
                                                            className="w-full text-left px-4 py-2 bg-gray-50 hover:bg-orange-50 hover:border-orange-300 border border-gray-200 rounded-lg text-sm text-gray-700 hover:text-orange-700 transition-all"
                                                        >
                                                            {question}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {messages.map((msg, i) => (
                                        <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[80%] p-3 rounded-2xl chat-bubble ${msg.role === 'user' ? 'bg-orange-500 text-white rounded-br-md' : 'bg-gray-100 text-gray-800 rounded-bl-md'}`}>
                                                {msg.role === 'user' ? (
                                                    <div className="whitespace-pre-wrap">{msg.content}</div>
                                                ) : (
                                                    <MarkdownContent content={msg.content} />
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                    {isTyping && (
                                        <div className="flex justify-start">
                                            <div className="bg-gray-100 p-3 rounded-2xl rounded-bl-md">
                                                <div className="typing-indicator flex gap-1">
                                                    <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                                                    <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                                                    <span className="w-2 h-2 bg-gray-400 rounded-full"></span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>
                                <div className="p-4 border-t">
                                    <form className="flex gap-2" onSubmit={(e) => { e.preventDefault(); handleSendMessage(); }}>
                                        <input
                                            type="text"
                                            value={inputValue}
                                            onChange={(e) => setInputValue(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                            placeholder={t.chatPlaceholder}
                                            className="flex-1 px-4 py-2 border border-gray-200 rounded-full focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none"
                                            aria-label="Chat message input"
                                            autoComplete="off"
                                        />
                                        <button
                                            type="submit"
                                            onClick={handleSendMessage}
                                            disabled={isTyping}
                                            className="px-6 py-2 bg-orange-500 text-white rounded-full hover:bg-orange-600 transition-colors disabled:opacity-50"
                                            aria-label="Send message"
                                        >{t.send}</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
